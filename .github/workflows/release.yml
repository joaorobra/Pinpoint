name: Release

# Builds the app and publishes installers to a GitHub Release
# whenever you push a version tag (e.g. v0.1.0).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Add more rows here later for macOS/Linux, e.g.:
          # - platform: macos-latest
          #   args: "--target universal-apple-darwin"
          # - platform: ubuntu-22.04
          #   args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "PINPOINT ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install PINPOINT."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
